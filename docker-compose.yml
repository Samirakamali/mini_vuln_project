version: "3.9"

services:
  web:
    build: .
    container_name: mini_vuln_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "change-me-in-real-project"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      EMAIL_HOST_USER: "your_email@gmail.com"
      EMAIL_HOST_PASSWORD: "your_app_password"
    cap_add:
      - NET_ADMIN
      - NET_RAW